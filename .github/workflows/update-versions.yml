name: Update Plugin Versions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch latest versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching latest versions for all plugins..."

          # Read the current marketplace.json
          marketplace_json=$(cat marketplace.json)

          # Get plugin count
          plugin_count=$(echo "$marketplace_json" | jq '.plugins | length')
          echo "Found $plugin_count plugins in catalog"

          # Create a temporary file for the updated marketplace
          echo "$marketplace_json" > marketplace.tmp.json

          # Iterate through each plugin
          for i in $(seq 0 $((plugin_count - 1))); do
            name=$(echo "$marketplace_json" | jq -r ".plugins[$i].name")
            repository=$(echo "$marketplace_json" | jq -r ".plugins[$i].repository")
            current_version=$(echo "$marketplace_json" | jq -r ".plugins[$i].version")

            echo ""
            echo "Processing: $name (current: v$current_version)"
            echo "  Repository: https://github.com/$repository"

            # Fetch latest release from GitHub
            latest_release=$(gh api repos/$repository/releases/latest 2>/dev/null || echo "")

            if [ -z "$latest_release" ]; then
              echo "  ⚠️  No releases found, keeping current version"
              continue
            fi

            # Extract version tag (remove 'v' prefix if present)
            latest_tag=$(echo "$latest_release" | jq -r '.tag_name')
            latest_version="${latest_tag#v}"

            # Check if release has the expected asset
            asset_name="${name}-v${latest_version}.tar.gz"
            has_asset=$(echo "$latest_release" | jq -r --arg asset "$asset_name" '.assets[] | select(.name == $asset) | .name')

            if [ -z "$has_asset" ]; then
              echo "  ⚠️  Release $latest_tag exists but missing asset: $asset_name"
              echo "  Keeping current version"
              continue
            fi

            # Compare versions
            if [ "$current_version" = "$latest_version" ]; then
              echo "  ✓ Already up to date: v$latest_version"
            else
              echo "  ✓ Updating: v$current_version → v$latest_version"
              # Update the version in the temp file
              jq ".plugins[$i].version = \"$latest_version\"" marketplace.tmp.json > marketplace.tmp2.json
              mv marketplace.tmp2.json marketplace.tmp.json
            fi
          done

          echo ""
          echo "Version update complete!"

          # Replace original with updated version
          mv marketplace.tmp.json marketplace.json

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet marketplace.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changes detected:"
            git diff marketplace.json
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add marketplace.json
          git commit -m "chore: update plugin versions from latest releases"
          git push origin main

      - name: Summary
        run: |
          echo "## Version Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ Marketplace updated with latest plugin versions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changes" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff HEAD~1 marketplace.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✓ All plugins already at latest versions" >> $GITHUB_STEP_SUMMARY
          fi
