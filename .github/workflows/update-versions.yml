name: Update Plugin Versions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'marketplace.json'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch latest versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching latest versions for all plugins..."

          # Read the current marketplace.json
          marketplace_json=$(cat marketplace.json)

          # Get plugin count
          plugin_count=$(echo "$marketplace_json" | jq '.plugins | length')
          echo "Found $plugin_count plugins in catalog"

          # Create a temporary file for the updated marketplace
          echo "$marketplace_json" > marketplace.tmp.json

          # Iterate through each plugin
          for i in $(seq 0 $((plugin_count - 1))); do
            name=$(echo "$marketplace_json" | jq -r ".plugins[$i].name")
            repository=$(echo "$marketplace_json" | jq -r ".plugins[$i].repository")
            current_version=$(echo "$marketplace_json" | jq -r ".plugins[$i].version")

            echo ""
            echo "Processing: $name (current: v$current_version)"
            echo "  Repository: https://github.com/$repository"

            # Fetch latest release from GitHub
            latest_release=$(gh api repos/$repository/releases/latest 2>/dev/null || echo "")

            if [ -z "$latest_release" ]; then
              echo "  ⚠️  No releases found, keeping current version"
              continue
            fi

            # Extract version tag (remove 'v' prefix if present)
            latest_tag=$(echo "$latest_release" | jq -r '.tag_name')
            latest_version="${latest_tag#v}"

            # Check if release has the expected asset
            asset_name="${name}-v${latest_version}.tar.gz"
            has_asset=$(echo "$latest_release" | jq -r --arg asset "$asset_name" '.assets[] | select(.name == $asset) | .name')

            if [ -z "$has_asset" ]; then
              echo "  ⚠️  Release $latest_tag exists but missing asset: $asset_name"
              echo "  Keeping current version"
              continue
            fi

            # Download asset to extract plugin.json for author
            asset_url=$(echo "$latest_release" | jq -r --arg asset "$asset_name" '.assets[] | select(.name == $asset) | .url')
            plugin_author=""
            if [ -n "$asset_url" ]; then
              curl -sL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" "$asset_url" -o plugin_asset.tar.gz 2>/dev/null
              plugin_author=$(tar -xOzf plugin_asset.tar.gz ./plugin.json 2>/dev/null | jq -r '.author // empty')
              rm -f plugin_asset.tar.gz
            fi

            # Compare versions and update
            updated=false
            if [ "$current_version" != "$latest_version" ]; then
              echo "  ✓ Updating version: v$current_version → v$latest_version"
              jq ".plugins[$i].version = \"$latest_version\"" marketplace.tmp.json > marketplace.tmp2.json
              mv marketplace.tmp2.json marketplace.tmp.json
              updated=true
            fi

            if [ -n "$plugin_author" ]; then
              current_author=$(echo "$marketplace_json" | jq -r ".plugins[$i].author")
              if [ "$current_author" != "$plugin_author" ]; then
                echo "  ✓ Updating author: $current_author → $plugin_author"
                jq ".plugins[$i].author = \"$plugin_author\"" marketplace.tmp.json > marketplace.tmp2.json
                mv marketplace.tmp2.json marketplace.tmp.json
                updated=true
              fi
            fi

            if [ "$updated" = false ]; then
              echo "  ✓ Already up to date: v$latest_version"
            fi
          done

          echo ""
          echo "Version update complete!"

          # Replace original with updated version
          mv marketplace.tmp.json marketplace.json

      - name: Generate README
        run: |
          cat > README.md <<'HEADER'
          # Kai Plugin Marketplace

          Plugin catalog for Kai Desktop.

          ## About

          This repository hosts `marketplace.json` — a catalog of plugins available for installation through Kai's built-in plugin marketplace.

          ## Plugins

          | Plugin | Version | Description |
          |--------|---------|-------------|
          HEADER
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' README.md

          # Generate table rows from marketplace.json
          jq -r '.plugins[] | "| [\(.name)](https://github.com/\(.repository)) | v\(.version) | \(.description) |"' marketplace.json >> README.md

          cat >> README.md <<'FOOTER'

          ## Schema Version

          The `schemaVersion` field at the root of `marketplace.json` indicates the catalog format version. Current version: `1`.
          FOOTER

          echo "Generated README.md with $(jq '.plugins | length' marketplace.json) plugins"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet marketplace.json README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff marketplace.json README.md
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add marketplace.json README.md
          git commit -m "chore: update plugin versions from latest releases"
          git push origin main

      - name: Summary
        run: |
          echo "## Version Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ Marketplace updated with latest plugin versions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changes" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff HEAD~1 marketplace.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✓ All plugins already at latest versions" >> $GITHUB_STEP_SUMMARY
          fi
